name: Traffic & Revenue Sync

# Requires UMAMI_URL + UMAMI_API_TOKEN (same names as engine/.env — not NEXT_PUBLIC_*)
on:
  workflow_dispatch: {}
  schedule:
    - cron: "30 */4 * * *" # every 4 hours

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  snapshots:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      UMAMI_URL: ${{ secrets.UMAMI_URL }}
      UMAMI_API_TOKEN: ${{ secrets.UMAMI_API_TOKEN }}
      UMAMI_CLOUD_REGION: ${{ secrets.UMAMI_CLOUD_REGION }}
      TRAFFIC_SNAPSHOT_DAYS: "30"
      STRIPE_SECRET_ENCRYPTION_KEY: ${{ secrets.STRIPE_SECRET_ENCRYPTION_KEY }}
    defaults:
      run:
        working-directory: engine
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: engine/requirements.txt
      - run: pip install -r requirements.txt
      - name: Verify engine imports (CLI layout)
        run: python -c "import crypto_util, supabase_client, main; print('CLI import graph OK')"
      - name: Check required secrets for traffic
        run: |
          set -e
          if [ -z "${SUPABASE_URL:-}${NEXT_PUBLIC_SUPABASE_URL:-}" ]; then
            echo "::error::Set SUPABASE_URL or NEXT_PUBLIC_SUPABASE_URL repository secret"
            exit 1
          fi
          test -n "$SUPABASE_SERVICE_ROLE_KEY" || { echo "::error::Secret SUPABASE_SERVICE_ROLE_KEY is empty"; exit 1; }
          test -n "$UMAMI_URL" || { echo "::error::Secret UMAMI_URL is empty"; exit 1; }
          test -n "$UMAMI_API_TOKEN" || { echo "::error::Secret UMAMI_API_TOKEN is empty"; exit 1; }
      - name: Traffic snapshots (Umami)
        run: python main.py traffic
      - name: Revenue snapshots (Stripe)
        run: python main.py revenue
