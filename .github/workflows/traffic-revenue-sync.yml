name: Traffic & Revenue Sync

on:
  workflow_dispatch: {}
  schedule:
    - cron: "30 */4 * * *" # every 4 hours

jobs:
  snapshots:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: engine/requirements.txt
      - run: pip install -r requirements.txt
      - name: Traffic snapshots (Umami)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          UMAMI_URL: ${{ secrets.UMAMI_URL }}
          UMAMI_API_TOKEN: ${{ secrets.UMAMI_API_TOKEN }}
          STRIPE_SECRET_ENCRYPTION_KEY: ${{ secrets.STRIPE_SECRET_ENCRYPTION_KEY }}
        run: python main.py traffic
      - name: Revenue snapshots (Stripe)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          STRIPE_SECRET_ENCRYPTION_KEY: ${{ secrets.STRIPE_SECRET_ENCRYPTION_KEY }}
        run: python main.py revenue
