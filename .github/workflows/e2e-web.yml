name: Web E2E (Playwright)

on:
  push:
    branches: [main, master]
    paths:
      - "web/**"
      - ".github/workflows/e2e-web.yml"
  pull_request:
    paths:
      - "web/**"
      - ".github/workflows/e2e-web.yml"

jobs:
  playwright:
    timeout-minutes: 25
    runs-on: ubuntu-latest
    env:
      # Opt into Node 24 for JS-based actions (checkout/setup-node/upload-artifact) before the runner default flip.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npm run test:e2e
        env:
          CI: true
          # Optional: forwards Supabase from repo secrets when configured (Tier D health can flip to ok).
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # Set repository variable ENFORCE_HEALTH_OK=1 when the three secrets above are always present.
          ENFORCE_HEALTH_OK: ${{ vars.ENFORCE_HEALTH_OK }}

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7
