name: Marketing Engine (Daily)

# Repo → Settings → Secrets and variables → Actions (use UMAMI_URL, not NEXT_PUBLIC_UMAMI_URL)
on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 8 * * *" # 08:00 UTC

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  crew-run:
    runs-on: ubuntu-latest
    # Job-level env so every step (including diagnostics) receives the same secrets.
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      ENGINE_USE_GROQ_ONLY: "1"
      ENGINE_FORCE_GROQ: "1"
      # Ollama local fallback — used automatically when Groq returns empty / rate-limits.
      ENGINE_USE_OLLAMA_FALLBACK: "1"
      OLLAMA_BASE_URL: "http://127.0.0.1:11434"
      OLLAMA_TEXT_MODEL: "llama3.2:1b"
      OLLAMA_TIMEOUT_SEC: "180"
      UMAMI_URL: ${{ secrets.UMAMI_URL }}
      UMAMI_API_TOKEN: ${{ secrets.UMAMI_API_TOKEN }}
      UMAMI_CLOUD_REGION: ${{ secrets.UMAMI_CLOUD_REGION }}
      TRAFFIC_SNAPSHOT_DAYS: "30"
      STRIPE_SECRET_ENCRYPTION_KEY: ${{ secrets.STRIPE_SECRET_ENCRYPTION_KEY }}
      # Pace Groq/API calls between portfolio brands (seconds). Set 0 to disable.
      ENGINE_SLEEP_BETWEEN_BUSINESSES_SEC: "20"
      # ── PestTrace outreach (disabled by default; set OUTREACH_ENABLED=1 in secrets to enable)
      OUTREACH_ENABLED: ${{ secrets.OUTREACH_ENABLED || '0' }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT || '587' }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      OUTREACH_FROM_NAME: ${{ secrets.OUTREACH_FROM_NAME || 'PestTrace Team' }}
      OUTREACH_FROM_EMAIL: ${{ secrets.OUTREACH_FROM_EMAIL || secrets.SMTP_USER }}
      OUTREACH_DAILY_SEND_LIMIT: ${{ secrets.OUTREACH_DAILY_SEND_LIMIT || '20' }}
      OUTREACH_SCRAPE_LIMIT: ${{ secrets.OUTREACH_SCRAPE_LIMIT || '30' }}
      OUTREACH_COUNTRIES: ${{ secrets.OUTREACH_COUNTRIES || 'UK,US,CA,AU' }}
    defaults:
      run:
        working-directory: engine
    steps:
      # v6+ uses Node 24–compatible runners (avoids Node 20 deprecation on checkout/setup)
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: engine/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Install Playwright browsers
        run: playwright install --with-deps chromium
      - name: Check required secrets
        run: |
          set -e
          if [ -z "${SUPABASE_URL:-}${NEXT_PUBLIC_SUPABASE_URL:-}" ]; then
            echo "::error::Set repository secret SUPABASE_URL (recommended) OR NEXT_PUBLIC_SUPABASE_URL — same value as https://YOUR-PROJECT.supabase.co"
            exit 1
          fi
          test -n "$SUPABASE_SERVICE_ROLE_KEY" || { echo "::error::Secret SUPABASE_SERVICE_ROLE_KEY is empty"; exit 1; }
          if [ -z "${GROQ_API_KEY:-}" ]; then
            echo "::error::Set repository secret GROQ_API_KEY (workflow is Groq-only)."
            exit 1
          fi
          if [ -n "${GOOGLE_API_KEY:-}" ]; then
            echo "::notice::GOOGLE_API_KEY is present but ignored because ENGINE_USE_GROQ_ONLY=1 / ENGINE_FORCE_GROQ=1."
          fi
          test -n "${UMAMI_URL:-}" || { echo "::error::Secret UMAMI_URL is empty"; exit 1; }
          test -n "${UMAMI_API_TOKEN:-}" || { echo "::error::Secret UMAMI_API_TOKEN is empty"; exit 1; }
          echo "::notice::LLM chain: Groq (primary) → Ollama llama3.2:1b (fallback) → safe placeholder"
      # Install and start Ollama so it is available as a fallback if Groq rate-limits.
      # The pull (~770 MB) runs in parallel with the import check to save time.
      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          # Wait until the server is accepting connections (up to 30 s).
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:11434/ > /dev/null 2>&1 && echo "Ollama ready after ${i}s" && break
            sleep 1
          done
      - name: Pull Ollama model
        run: |
          ollama pull llama3.2:1b
          echo "::notice::Ollama llama3.2:1b ready — will be used if Groq is unavailable."
      # Fails fast if engine is run as scripts (no package parent) with relative imports left in place.
      - name: Verify engine imports (CLI layout)
        run: python -c "import crypto_util, supabase_client, main; print('CLI import graph OK')"
      - name: LLM provider diagnostics
        run: |
          python - <<'EOF'
          import sys
          sys.path.insert(0, ".")
          from config import active_llm_summary, ollama_fallback_enabled, ollama_text_model, ollama_base_url
          import urllib.request, json
          print("LLM provider chain:", active_llm_summary())
          # Verify Ollama is reachable
          if ollama_fallback_enabled():
              try:
                  with urllib.request.urlopen(f"{ollama_base_url()}/api/tags", timeout=5) as r:
                      tags = json.loads(r.read())
                      names = [m.get("name") for m in tags.get("models", [])]
                      print("Ollama models available:", names)
                      if ollama_text_model() in names:
                          print(f"Ollama fallback: {ollama_text_model()} confirmed ready.")
                      else:
                          print(f"::warning::Ollama model {ollama_text_model()} not in list — fallback may fail.")
              except Exception as e:
                  print(f"::warning::Ollama not reachable: {e}")
          EOF
      - name: Run CrewAI engine
        run: python main.py full
      # PestTrace outreach: scrape new pest control businesses + generate email drafts.
      # Enabled only when OUTREACH_ENABLED=1 is set as a repository secret.
      # Actual email sending is done from the dashboard after human review.
      - name: Run outreach pipeline (PestTrace)
        if: ${{ env.OUTREACH_ENABLED == '1' }}
        run: python main.py outreach
