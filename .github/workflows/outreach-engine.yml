name: Outreach Engine

# Generates B2B email drafts only — scrape prospects + LLM email drafting.
# Triggered manually from the dashboard "Run outreach engine" button.
# Sending is done from the dashboard after human review.
#
# Campaigns:
#   pesttrace — compliance SaaS → pest control firms (UK/US/CA/AU)
#   weathers  — Weathers Pest Solutions services → UK West Midlands businesses
#   jgdevs    — JGDevs web/SEO/booking → UK small businesses
#   breazy    — Breazy Productions cinematic videography → UK venues, brands, artists
#   all       — run every campaign in sequence
on:
  workflow_dispatch:
    inputs:
      campaign:
        description: "Outreach campaign to run (pesttrace, weathers, jgdevs, breazy, all)"
        required: false
        default: "all"
        type: choice
        options:
          - pesttrace
          - weathers
          - jgdevs
          - breazy
          - all

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  outreach-run:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      ENGINE_USE_GROQ_ONLY: "1"
      ENGINE_FORCE_GROQ: "1"
      ENGINE_USE_OLLAMA_FALLBACK: "1"
      OLLAMA_BASE_URL: "http://127.0.0.1:11434"
      OLLAMA_TEXT_MODEL: "llama3.2:1b"
      OLLAMA_TIMEOUT_SEC: "180"
      # SMTP secrets are NOT required here — emails are sent from the dashboard.
      OUTREACH_FROM_NAME: ${{ secrets.OUTREACH_FROM_NAME || 'PestTrace Team' }}
      OUTREACH_FROM_EMAIL: ${{ secrets.OUTREACH_FROM_EMAIL || secrets.SMTP_USER }}
      OUTREACH_SCRAPE_LIMIT: ${{ secrets.OUTREACH_SCRAPE_LIMIT || '30' }}
      OUTREACH_COUNTRIES: ${{ secrets.OUTREACH_COUNTRIES || 'UK,US,CA,AU' }}
      # Weathers Pest Solutions sender identity (used by the dashboard send route)
      WEATHERS_OUTREACH_FROM_NAME: ${{ secrets.WEATHERS_OUTREACH_FROM_NAME || 'Weathers Pest Solutions' }}
      WEATHERS_OUTREACH_FROM_EMAIL: ${{ secrets.WEATHERS_OUTREACH_FROM_EMAIL || 'WeathersPestSolutions@hotmail.com' }}
      WEATHERS_SMTP_HOST: ${{ secrets.WEATHERS_SMTP_HOST || 'smtp-mail.outlook.com' }}
      WEATHERS_SMTP_PORT: ${{ secrets.WEATHERS_SMTP_PORT || '587' }}
      WEATHERS_SMTP_USER: ${{ secrets.WEATHERS_SMTP_USER || secrets.WEATHERS_OUTREACH_FROM_EMAIL }}
      WEATHERS_SMTP_PASSWORD: ${{ secrets.WEATHERS_SMTP_PASSWORD }}
      JGDEVS_OUTREACH_FROM_NAME: ${{ secrets.JGDEVS_OUTREACH_FROM_NAME || 'JGDevs' }}
      JGDEVS_OUTREACH_FROM_EMAIL: ${{ secrets.JGDEVS_OUTREACH_FROM_EMAIL }}
      JGDEVS_SMTP_HOST: ${{ secrets.JGDEVS_SMTP_HOST || secrets.SMTP_HOST }}
      JGDEVS_SMTP_PORT: ${{ secrets.JGDEVS_SMTP_PORT || '587' }}
      JGDEVS_SMTP_USER: ${{ secrets.JGDEVS_SMTP_USER || secrets.JGDEVS_OUTREACH_FROM_EMAIL }}
      JGDEVS_SMTP_PASSWORD: ${{ secrets.JGDEVS_SMTP_PASSWORD || secrets.SMTP_PASSWORD }}
      # Campaign id forwarded to python main.py outreach
      OUTREACH_CAMPAIGN: ${{ inputs.campaign || 'pesttrace' }}
    defaults:
      run:
        working-directory: engine
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: engine/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Check required secrets
        run: |
          set -e
          if [ -z "${SUPABASE_URL:-}${NEXT_PUBLIC_SUPABASE_URL:-}" ]; then
            echo "::error::Set repository secret SUPABASE_URL or NEXT_PUBLIC_SUPABASE_URL"
            exit 1
          fi
          test -n "$SUPABASE_SERVICE_ROLE_KEY" || { echo "::error::SUPABASE_SERVICE_ROLE_KEY is empty"; exit 1; }
          if [ -z "${GROQ_API_KEY:-}" ]; then
            echo "::error::Set repository secret GROQ_API_KEY (workflow is Groq-only)."
            exit 1
          fi
          echo "::notice::LLM chain: Groq (primary) → Ollama llama3.2:1b (fallback) → safe placeholder"

      # Install Ollama as a fallback so the outreach LLM step still produces drafts
      # if Groq rate-limits mid-run.
      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:11434/ > /dev/null 2>&1 && echo "Ollama ready after ${i}s" && break
            sleep 1
          done

      - name: Pull Ollama model
        run: |
          ollama pull llama3.2:1b
          echo "::notice::Ollama llama3.2:1b ready — will be used if Groq is unavailable."

      - name: Verify engine imports
        run: python -c "import crypto_util, supabase_client, main; print('CLI import graph OK')"

      - name: Run engine unit tests
        run: python -m pytest tests/ -q

      - name: Run outreach pipeline (scrape + draft emails)
        run: python main.py outreach --campaign "${OUTREACH_CAMPAIGN}"
